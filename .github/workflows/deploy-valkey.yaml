name: Deploy Valkey

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-valkey.yaml'
      - '.nais/valkey/**'

env:
  TZ: Europe/Oslo

jobs:
  build-push-valkey-image:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest

    steps:
       - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # ratchet:step-security/harden-runner@v2.19.4
         with:
          egress-policy: audit

       - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
         with:
          persist-credentials: false

       - name: Build Valkey-image and push to GAR
         id: docker-build-push
         uses: nais/docker-build-push@31c3a7321909bcb20799fdf46153fec721fd9512 # ratchet:nais/docker-build-push@v0
         with:
           team: okonomi
           dockerfile: .nais/valkey/Dockerfile
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  deploy-dev-q1:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      deployments: write
    needs: [ build-push-valkey-image ]
    name: Deploy valkey to dev-fss-q1
    uses: navikt/mob-gha-workflows/.github/workflows/nais-deploy.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/nais-deploy.yaml@v1.0.0
    with:
      cluster: dev-fss
      resource: .nais/valkey/valkey-q1.yaml
      image: ${{ needs.build-push-valkey-image.outputs.image }}

  deploy-dev-qx:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      deployments: write
    needs: [ build-push-valkey-image, deploy-dev-q1 ]
    name: Deploy valkey to dev-fss-qx
    uses: navikt/mob-gha-workflows/.github/workflows/nais-deploy.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/nais-deploy.yaml@v1.0.0
    with:
      cluster: dev-fss
      resource: .nais/valkey/valkey-qx.yaml
      image: ${{ needs.build-push-valkey-image.outputs.image }}

  deploy-prod:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      deployments: write
    needs: [ build-push-valkey-image, deploy-dev-q1, deploy-dev-qx ]
    name: Deploy valkey to prod-fss
    uses: navikt/mob-gha-workflows/.github/workflows/nais-deploy.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/nais-deploy.yaml@v1.0.0
    with:
      cluster: prod-fss
      resource: .nais/valkey/valkey-prod.yaml
      image: ${{ needs.build-push-valkey-image.outputs.image }}